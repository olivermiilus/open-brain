<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Open Brain</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    textarea {
      flex: 1;
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #e8e8e8;
      font-family: inherit;
      font-size: 1.05rem;
      line-height: 1.6;
      padding: 16px;
      resize: none;
      outline: none;
      min-height: 180px;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #444; }
    textarea::placeholder { color: #444; }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: default; }

    #btn-save {
      background: #fff;
      color: #000;
    }
    #btn-clear {
      background: #222;
      color: #888;
      flex: 0 0 auto;
      padding: 14px 20px;
    }

    #status {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
    }
    #status.ok  { background: #1a2e1a; color: #6fcf6f; display: block; }
    #status.err { background: #2e1a1a; color: #cf6f6f; display: block; }
    #status.loading { background: #1a1a2e; color: #6f9fcf; display: block; }

    .recent {
      margin-top: 24px;
    }
    .recent h2 {
      font-size: 0.8rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }
    .thought-item {
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      line-height: 1.5;
      color: #bbb;
    }
    .thought-item .meta {
      font-size: 0.75rem;
      color: #444;
      margin-top: 6px;
    }
    #btn-load-recent {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #555;
      font-size: 0.85rem;
      padding: 10px;
      flex: none;
      width: 100%;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>Open Brain</h1>

  <textarea
    id="thought"
    placeholder="Vad tänker du på?"
    autofocus
    rows="6"
  ></textarea>

  <div class="actions">
    <button id="btn-save">Spara tanke</button>
    <button id="btn-clear">Rensa</button>
  </div>

  <div id="status"></div>

  <div class="recent">
    <h2>Senaste</h2>
    <div id="recent-list"></div>
    <button id="btn-load-recent">Ladda senaste tankarna</button>
  </div>

  <script>
    const SUPABASE_URL = "https://sdgmznktypkdjrmwkvqu.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkZ216bmt0eXBrZGpybXdrdnF1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjQ4MTk2OSwiZXhwIjoyMDg4MDU3OTY5fQ.CDMNcNp0WbmZBBStQRJqw85zSuJoI03zfqJwS7HjNic";

    const headers = {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
    };

    const textarea   = document.getElementById("thought");
    const btnSave    = document.getElementById("btn-save");
    const btnClear   = document.getElementById("btn-clear");
    const statusEl   = document.getElementById("status");
    const recentList = document.getElementById("recent-list");
    const btnRecent  = document.getElementById("btn-load-recent");

    function showStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = type;
    }

    btnSave.addEventListener("click", async () => {
      const content = textarea.value.trim();
      if (!content) return;

      btnSave.disabled = true;
      showStatus("Sparar...", "loading");

      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/capture-thought`, {
          method: "POST",
          headers,
          body: JSON.stringify({ content }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        showStatus("Sparad!", "ok");
        textarea.value = "";
        setTimeout(() => { statusEl.style.display = "none"; }, 2500);
      } catch (e) {
        showStatus(`Fel: ${e.message}`, "err");
      } finally {
        btnSave.disabled = false;
      }
    });

    btnClear.addEventListener("click", () => {
      textarea.value = "";
      statusEl.style.display = "none";
      textarea.focus();
    });

    btnRecent.addEventListener("click", async () => {
      btnRecent.disabled = true;
      btnRecent.textContent = "Laddar...";
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/thoughts?select=content,metadata,created_at&order=created_at.desc&limit=10`,
          { headers }
        );
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const thoughts = await res.json();

        recentList.innerHTML = thoughts.map(t => {
          const date = new Date(t.created_at).toLocaleString("sv-SE", {
            month: "short", day: "numeric", hour: "2-digit", minute: "2-digit"
          });
          const preview = t.content.length > 160
            ? t.content.slice(0, 160) + "…"
            : t.content;
          return `<div class="thought-item">${escHtml(preview)}<div class="meta">${date}</div></div>`;
        }).join("");
      } catch (e) {
        recentList.innerHTML = `<div class="thought-item" style="color:#cf6f6f">Kunde inte ladda: ${e.message}</div>`;
      } finally {
        btnRecent.disabled = false;
        btnRecent.textContent = "Ladda senaste tankarna";
      }
    });

    // Spara med Cmd+Enter / Ctrl+Enter
    textarea.addEventListener("keydown", e => {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
        btnSave.click();
      }
    });

    function escHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
  </script>
</body>
</html>
