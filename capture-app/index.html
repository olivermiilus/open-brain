<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Open Brain</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .header {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    h1 {
      color: #e0e0e0;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    .tab-button {
      flex: 1;
      padding: 12px;
      background: #1a1a1a;
      border: none;
      color: #666;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
    }

    .tab-button.active {
      color: #e0e0e0;
      border-bottom-color: #3b82f6;
    }

    .tab-button:active {
      background: #222;
    }

    .content {
      flex: 1;
      overflow: hidden;
      display: flex;
    }

    .tab-content {
      display: none;
      flex: 1;
      overflow: hidden;
      flex-direction: column;
    }

    .tab-content.active {
      display: flex;
    }

    /* INPUT TAB */
    .input-tab {
      padding: 16px;
    }

    .input-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 12px;
    }

    textarea {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 8px;
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 16px;
      resize: none;
      outline: none;
      transition: background 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    textarea:focus {
      background: #1a1a1a;
    }

    textarea::placeholder {
      color: #555;
    }

    .button-group {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    .btn-save {
      background: #3b82f6;
      color: white;
    }

    .btn-save:active {
      background: #2563eb;
    }

    .btn-clear {
      background: #333;
      color: #aaa;
    }

    .btn-clear:active {
      background: #444;
    }

    .status {
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      font-size: 13px;
      display: none;
      min-height: 20px;
    }

    .status.success {
      background: #1b4332;
      color: #52b788;
    }

    .status.error {
      background: #5a1e1e;
      color: #ff6b6b;
    }

    .status.loading {
      background: #1e3a5f;
      color: #60a5fa;
    }

    /* VIEW TAB */
    .view-tab {
      padding: 0;
      flex-direction: column;
    }

    .search-container {
      padding: 12px;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    .search-input {
      width: 100%;
      padding: 10px 12px;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .search-input::placeholder {
      color: #555;
    }

    .thoughts-list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px;
    }

    .thought-item {
      position: relative;
      margin-bottom: 12px;
      overflow: hidden;
      border-radius: 8px;
    }

    .thought-content-wrapper {
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px;
      position: relative;
      transition: transform 0.2s ease-out;
      -webkit-user-select: text;
      user-select: text;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .thought-item.swipe-active .thought-content-wrapper {
      transform: translateX(-80px);
    }

    .thought-actions {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      display: flex;
      background: #d32f2f;
      z-index: 1;
      border-radius: 0 8px 8px 0;
    }

    .action-button {
      flex: 1;
      padding: 0 20px;
      border: none;
      background: none;
      color: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .action-button:active {
      background: rgba(0, 0, 0, 0.1);
    }

    .thought-content-inner {
      flex: 1;
    }

    .thought-content {
      color: #e0e0e0;
      font-size: 14px;
      line-height: 1.4;
      margin-bottom: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .thought-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #666;
    }

    .thought-date {
      font-size: 11px;
    }

    .thoughts-empty {
      text-align: center;
      color: #555;
      padding-top: 40px;
      font-size: 14px;
    }

    .loading-spinner {
      text-align: center;
      color: #666;
      padding-top: 40px;
    }

    .pull-refresh-indicator {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      border-bottom: 1px solid #2a2a2a;
      z-index: 10;
      transform: translateY(-60px);
      transition: transform 0.2s ease-out;
    }

    .pull-refresh-indicator.visible {
      transform: translateY(0);
    }

    .pull-refresh-indicator.loading {
      transform: translateY(0);
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #333;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .pull-arrow {
      font-size: 20px;
      color: #666;
      transform: translateY(0);
      transition: transform 0.2s;
    }

    .pull-arrow.ready {
      transform: translateY(-4px);
      color: #3b82f6;
    }

    .thoughts-list-wrapper {
      position: relative;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    @media (max-width: 480px) {
      .input-tab {
        padding: 12px;
      }

      textarea {
        font-size: 16px;
      }

      .thought-content {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="header">
      <h1>Open Brain</h1>
    </div>

    <div class="tabs">
      <button class="tab-button active" onclick="switchTab('input')">Input</button>
      <button class="tab-button" onclick="switchTab('view')">View</button>
    </div>

    <div class="content">
      <!-- INPUT TAB -->
      <div id="input" class="tab-content active input-tab">
        <form id="captureForm" class="input-container">
          <textarea
            id="thought"
            placeholder="Write your thought..."
            required
          ></textarea>

          <div id="status" class="status"></div>

          <div class="button-group">
            <button type="submit" class="btn-save">Save</button>
            <button type="reset" class="btn-clear">Clear</button>
          </div>
        </form>
      </div>

      <!-- VIEW TAB -->
      <div id="view" class="tab-content view-tab">
        <div class="search-container">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search thoughts..."
            onkeyup="filterThoughts()"
          />
        </div>
        <div id="thoughtsListWrapper" class="thoughts-list-wrapper">
          <div class="pull-refresh-indicator" id="pullIndicator">
            <div class="pull-arrow" id="pullArrow">↓</div>
            <div class="spinner" id="pullSpinner" style="display: none;"></div>
          </div>
          <div id="thoughtsList" class="thoughts-list">
            <div class="loading-spinner">Loading...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://sdgmznktypkdjrmwkvqu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkZ216bmt0eXBrZGpybXdrdnF1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjQ4MTk2OSwiZXhwIjoyMDg4MDU3OTY5fQ.CDMNcNp0WbmZBBStQRJqw85zSuJoI03zfqJwS7HjNic';

    let allThoughts = [];

    // TAB SWITCHING
    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));

      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');

      if (tabName === 'view') {
        if (allThoughts.length === 0) {
          loadThoughts();
        }
        initPullToRefresh();
      }
    }

    // CAPTURE FORM
    const form = document.getElementById('captureForm');
    const thoughtInput = document.getElementById('thought');
    const statusDiv = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const content = thoughtInput.value.trim();
      if (!content) {
        showStatus('Enter a thought', 'error');
        return;
      }

      showStatus('Saving...', 'loading');

      try {
        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/capture-thought`,
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
            },
            body: JSON.stringify({ content }),
          }
        );

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        showStatus('Saved', 'success');
        form.reset();
        allThoughts = [];
        setTimeout(() => statusDiv.style.display = 'none', 2000);
      } catch (error) {
        console.error('Error:', error);
        showStatus('Error: ' + error.message, 'error');
      }
    });

    function showStatus(message, type) {
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;
    }

    // PULL TO REFRESH
    let pullStartY = 0;
    let isPulling = false;
    let isLoading = false;

    function initPullToRefresh() {
      const wrapper = document.getElementById('thoughtsListWrapper');
      const indicator = document.getElementById('pullIndicator');
      const arrow = document.getElementById('pullArrow');
      const spinner = document.getElementById('pullSpinner');

      wrapper.addEventListener('touchstart', (e) => {
        if (wrapper.scrollTop === 0) {
          pullStartY = e.touches[0].clientY;
          isPulling = true;
        }
      });

      wrapper.addEventListener('touchmove', (e) => {
        if (!isPulling || isLoading) return;

        const currentY = e.touches[0].clientY;
        const diff = currentY - pullStartY;

        if (diff > 0) {
          e.preventDefault();
          const pullDistance = Math.min(diff, 100);
          indicator.style.transform = `translateY(${pullDistance - 60}px)`;

          if (pullDistance > 60) {
            arrow.classList.add('ready');
          } else {
            arrow.classList.remove('ready');
          }
        } else {
          isPulling = false;
        }
      });

      wrapper.addEventListener('touchend', async () => {
        if (!isPulling || isLoading) {
          isPulling = false;
          return;
        }

        const pullDistance = parseInt(indicator.style.transform.match(/[\d.]+/)[0]) + 60;

        if (pullDistance > 60) {
          // Trigger refresh
          isLoading = true;
          arrow.style.display = 'none';
          spinner.style.display = 'block';
          indicator.classList.add('loading');

          await loadThoughts();

          // Reset
          setTimeout(() => {
            indicator.style.transform = 'translateY(-60px)';
            arrow.style.display = 'block';
            spinner.style.display = 'none';
            indicator.classList.remove('loading');
            isLoading = false;
            isPulling = false;
          }, 500);
        } else {
          indicator.style.transform = 'translateY(-60px)';
          arrow.classList.remove('ready');
          isPulling = false;
        }
      });
    }

    // VIEW THOUGHTS
    async function loadThoughts() {
      const listDiv = document.getElementById('thoughtsList');

      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/thoughts?select=*&order=created_at.desc&limit=100`,
          {
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
            }
          }
        );

        if (!response.ok) {
          throw new Error('Failed to fetch thoughts');
        }

        allThoughts = await response.json();
        displayThoughts(allThoughts);
      } catch (error) {
        listDiv.innerHTML = '<div class="thoughts-empty">Error loading thoughts</div>';
        console.error('Error:', error);
      }
    }

    function displayThoughts(thoughts) {
      const listDiv = document.getElementById('thoughtsList');

      if (thoughts.length === 0) {
        listDiv.innerHTML = '<div class="thoughts-empty">No thoughts yet</div>';
        return;
      }

      listDiv.innerHTML = thoughts.map(thought => {
        const date = new Date(thought.created_at);
        const dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const topics = thought.metadata?.topics || [];

        return `
          <div class="thought-item" data-id="${thought.id}">
            <div class="thought-content-wrapper">
              <div class="thought-content-inner">
                <div class="thought-content">${escapeHtml(thought.content)}</div>
                <div class="thought-meta">
                  <div>
                    ${topics.length > 0 ? `<span>${topics.join(', ')}</span>` : ''}
                  </div>
                  <div class="thought-date">${dateStr}</div>
                </div>
              </div>
            </div>
            <div class="thought-actions">
              <button class="action-button" onclick="deleteThought('${thought.id}', event)">Delete</button>
            </div>
          </div>
        `;
      }).join('');

      // Add swipe listeners
      document.querySelectorAll('.thought-item').forEach(el => {
        addSwipeListener(el);
      });
    }

    function filterThoughts() {
      const search = document.getElementById('searchInput').value.toLowerCase();

      if (!search) {
        displayThoughts(allThoughts);
        return;
      }

      const filtered = allThoughts.filter(thought => {
        const content = thought.content.toLowerCase();
        const topics = (thought.metadata?.topics || []).join(' ').toLowerCase();
        const type = (thought.metadata?.type || '').toLowerCase();

        return content.includes(search) || topics.includes(search) || type.includes(search);
      });

      displayThoughts(filtered);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // SWIPE HANDLING
    function addSwipeListener(element) {
      let startX = 0;
      let startY = 0;
      let currentX = 0;

      const wrapper = element.querySelector('.thought-content-wrapper');

      element.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        currentX = 0;
      }, false);

      element.addEventListener('touchmove', (e) => {
        if (!wrapper) return;

        currentX = e.touches[0].clientX - startX;
        const deltaY = Math.abs(e.touches[0].clientY - startY);

        // Only swipe horizontally, not vertically (scroll)
        if (deltaY > 10) return;

        // Only allow swipe left
        if (currentX > 0) {
          currentX = 0;
          return;
        }

        e.preventDefault();
        wrapper.style.transform = `translateX(${currentX}px)`;
      }, false);

      element.addEventListener('touchend', (e) => {
        if (!wrapper) return;

        // If swiped more than 40px to the left, activate
        if (currentX < -40) {
          element.classList.add('swipe-active');
        } else {
          element.classList.remove('swipe-active');
          wrapper.style.transform = 'translateX(0)';
        }
      }, false);

      // Click anywhere else to close swipe
      document.addEventListener('touchstart', (e) => {
        if (!element.contains(e.target) && element.classList.contains('swipe-active')) {
          element.classList.remove('swipe-active');
          wrapper.style.transform = 'translateX(0)';
        }
      });
    }

    // DELETE THOUGHT
    async function deleteThought(thoughtId, event) {
      event.stopPropagation();

      if (!confirm('Delete this thought?')) return;

      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/thoughts?id=eq.${thoughtId}`,
          {
            method: 'DELETE',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
            }
          }
        );

        if (!response.ok) {
          throw new Error('Failed to delete');
        }

        // Remove from UI
        allThoughts = allThoughts.filter(t => t.id !== thoughtId);
        displayThoughts(allThoughts);
      } catch (error) {
        console.error('Error deleting thought:', error);
        alert('Error deleting thought');
      }
    }
  </script>
</body>
</html>
