name: Supabase Keepalive

# Håller Supabase-projektet open-brain aktivt genom att göra ett riktigt
# databasanrop två gånger i veckan (Supabase pausar free-tier-projekt efter
# >7 dagars inaktivitet). Körs oberoende av om datorn är på.

on:
  schedule:
    # Måndag och torsdag kl 07:13 UTC
    - cron: '13 7 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (thoughts table)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/thoughts?select=id&limit=1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")
          echo "Supabase svarade med HTTP $status"
          if [ "$status" -ge 400 ]; then
            echo "::error::Supabase-anropet misslyckades (HTTP $status)"
            exit 1
          fi
